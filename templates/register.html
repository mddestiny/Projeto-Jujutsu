<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar - Jujutsu Kaisen</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #000 0%, #1a0000 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: white;
    overflow: hidden;
}

body::before {
    content: "";
    position: fixed;
    width: 300%;
    height: 300%;
    background: radial-gradient(circle, rgba(255,0,0,0.15) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: drift 20s linear infinite;
    z-index: 1;
    top: -50%;
    left: -50%;
}

@keyframes drift {
    0% { transform: translate(0, 0); }
    100% { transform: translate(50px, 50px); }
}

.container {
    position: relative;
    z-index: 2;
    background: rgba(0, 0, 0, 0.95);
    padding: 50px;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(255, 0, 0, 0.8), inset 0 0 20px rgba(255, 0, 0, 0.2);
    width: 100%;
    max-width: 400px;
    border: 2px solid rgba(255, 0, 0, 0.5);
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    color: #ff4444;
    text-shadow: 0 0 10px rgba(255, 68, 68, 0.8);
    font-size: 28px;
    letter-spacing: 2px;
}

.form-group {
    margin-bottom: 20px;
}

label {
    display: block;
    margin-bottom: 8px;
    color: #ddd;
    font-weight: bold;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 12px;
    background: rgba(20, 20, 20, 0.9);
    border: 2px solid rgba(255, 0, 0, 0.3);
    border-radius: 8px;
    color: white;
    font-size: 14px;
    transition: all 0.3s;
}

input:focus {
    outline: none;
    border-color: #ff4444;
    box-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
    background: rgba(30, 10, 10, 0.9);
}

input::placeholder {
    color: #888;
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 10px;
    box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 25px rgba(255, 0, 0, 0.9);
}

button:active {
    transform: translateY(0);
}

.form-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
}

.form-footer a {
    color: #ff4444;
    text-decoration: none;
    font-weight: bold;
    transition: all 0.3s;
}

.form-footer a:hover {
    text-decoration: underline;
    color: #ffaaaa;
}

.form-footer p {
    margin: 0;
}
</style>
</head>
<body>
    <div class="container">
        <h1>🔥 CRIAR CONTA 🔥</h1>
        <form method="POST">
            <div class="form-group">
                <label for="username">Usuário:</label>
                <input type="text" id="username" name="username" placeholder="Escolha um usuário" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" placeholder="Crie uma senha forte" required>
            </div>
            <button type="submit">Criar Conta</button>
        </form>
        <div class="form-footer">
            <p>Já tem conta? <a href="/login">Faça login aqui</a></p>
        </div>
    </div>
</body>
</html>
