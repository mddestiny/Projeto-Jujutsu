<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Editar Ficha - Jujutsu</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="container">
<form method="POST">
<h1>Editar Ficha 🔥</h1>
<label>Nome:</label><input type="text" name="nome" value="{{ ficha.nome }}" required>
<label>Clã:</label>
<select name="cla">
<option value="Gojo" {% if ficha.cla=="Gojo" %}selected{% endif %}>Gojo</option>
<option value="Zenin" {% if ficha.cla=="Zenin" %}selected{% endif %}>Zenin</option>
<option value="Kamo" {% if ficha.cla=="Kamo" %}selected{% endif %}>Kamo</option>
<option value="Fushiguro" {% if ficha.cla=="Fushiguro" %}selected{% endif %}>Fushiguro</option>
</select>
<label>Nível:</label><input type="text" name="nivel" value="{{ ficha.nivel }}" required>
<label>Energia (0-100):</label><input type="number" name="energia" min="0" max="100" value="{{ ficha.energia }}" required>
<label>Técnica:</label><input type="text" name="tecnica" value="{{ ficha.tecnica }}" required>
<label>Habilidades:</label><textarea name="habilidades" required>{{ ficha.habilidades }}</textarea>
<button type="submit">Atualizar Ficha</button>
</form>
<a href="{{ url_for('home') }}">Voltar</a>
</div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
