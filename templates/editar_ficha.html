<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Ficha - Ordem Paranormal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1525 100%);
            color: #e0e0e0;
            font-family: 'Arial', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 600px; margin: auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #ff6b35;
        }

        .header h1 { color: #ff6b35; }
        .header a { color: #ff6b35; text-decoration: none; }

        .form-section {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #444;
            margin-bottom: 20px;
        }

        .form-section h2 { color: #ff6b35; margin-bottom: 15px; font-size: 16px; }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .form-group label { color: #888; font-size: 12px; margin-bottom: 5px; }
        .form-group input, .form-group textarea {
            background: #1a1a2e;
            border: 1px solid #444;
            color: #e0e0e0;
            padding: 10px;
            border-radius: 5px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            width: 100%;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 107, 53, 0.4); }

        .btn-voltar {
            background: #1a1a2e;
            color: #ff6b35;
            border: 1px solid #ff6b35;
            margin-bottom: 20px;
        }

        .btn-voltar:hover { background: #ff6b35; color: #1a1a2e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✏️ Editar Ficha</h1>
            <span class="classe">{{ ficha.cla }}</span>
        </div>

        <a href="/" class="btn-voltar" style="display: block; text-align: center; padding: 10px; border-radius: 5px; text-decoration: none; margin-bottom: 20px;">← Voltar</a>

        <form method="POST">
            <!-- INFORMAÇÕES BÁSICAS -->
            <div class="form-section">
                <h2>Informações Básicas</h2>
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" name="nome" value="{{ ficha.nome }}" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Classe/Arquétipo</label>
                        <input type="text" name="cla" value="{{ ficha.cla }}" required>
                    </div>
                    <div class="form-group">
                        <label>Nível</label>
                        <input type="text" name="nivel" value="{{ ficha.nivel }}" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Técnica</label>
                    <input type="text" name="tecnica" value="{{ ficha.tecnica }}" required>
                </div>
                <div class="form-group">
                    <label>Especialidade</label>
                    <input type="text" name="especial" value="{{ ficha.especial }}">
                </div>
            </div>

            <!-- ATRIBUTOS -->
            <div class="form-section">
                <h2>Atributos Principais</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>Força</label>
                        <input type="number" name="forca" value="{{ ficha.forca }}">
                    </div>
                    <div class="form-group">
                        <label>Agilidade</label>
                        <input type="number" name="agilidade" value="{{ ficha.agilidade }}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Defesa</label>
                        <input type="number" name="defesa" value="{{ ficha.defesa }}">
                    </div>
                    <div class="form-group">
                        <label>Energia</label>
                        <input type="number" name="energia" value="{{ ficha.energia }}">
                    </div>
                </div>
            </div>

            <!-- RECURSOS DO PERSONAGEM -->
            <div class="form-section">
                <h2>Recursos</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>Vida</label>
                        <input type="number" name="vida" value="{{ ficha.vida }}">
                    </div>
                    <div class="form-group">
                        <label>Sanidade</label>
                        <input type="number" name="sanidade" value="{{ ficha.sanidade }}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Esforço</label>
                        <input type="number" name="esforco" value="{{ ficha.esforco }}">
                    </div>
                    <div class="form-group">
                        <label>PE/Turno</label>
                        <input type="number" name="pe_turno" value="{{ ficha.pe_turno }}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>NEX (Nível de Experiência)</label>
                        <input type="number" name="nex" value="{{ ficha.nex }}">
                    </div>
                </div>
            </div>

            <!-- PERÍCIAS -->
            <div class="form-section">
                <h2>⚔️ Perícias e Treinos</h2>
                <div id="pericias-container">
                    {% set pericias = ficha.get_pericias() %}
                    {% if pericias %}
                        {% for pericia in pericias %}
                            <div class="form-row" style="align-items: center; margin-bottom: 10px;">
                                <div class="form-group">
                                    <label>Nome</label>
                                    <input type="text" value="{{ pericia.nome }}" disabled style="background: #0a0e27; color: #888;">
                                </div>
                                <div class="form-group">
                                    <label>Bônus</label>
                                    <input type="number" value="{{ pericia.bonus }}" disabled style="background: #0a0e27; color: #888;">
                                </div>
                                <button type="button" onclick="removerPericia('{{ ficha.id }}', '{{ pericia.nome }}')" style="margin-top: 18px; background: #c0392b; padding: 8px 12px; font-size: 12px; width: auto;">🗑️ Remover</button>
                            </div>
                        {% endfor %}
                    {% endif %}
                </div>
                <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #444;">
                    <h3 style="color: #ff6b35; font-size: 14px; margin-bottom: 10px;">+ Adicionar Perícia</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nome da Perícia</label>
                            <input type="text" id="nova-pericia-nome" placeholder="Ex: Ocultismo, Rastreamento...">
                        </div>
                        <div class="form-group">
                            <label>Bônus</label>
                            <input type="number" id="nova-pericia-bonus" placeholder="0" value="0">
                        </div>
                        <button type="button" onclick="adicionarPericia('{{ ficha.id }}')" style="margin-top: 18px; background: #27ae60; padding: 8px 16px; width: auto;">➕ Adicionar</button>
                    </div>
                </div>
            </div>

            <!-- DESCRIÇÃO -->
            <div class="form-section">
                <h2>Descrição e Habilidades</h2>
                <div class="form-group">
                    <label>Habilidades e Perícias</label>
                    <textarea name="habilidades" required>{{ ficha.habilidades }}</textarea>
                </div>
            </div>

            <button type="submit">✅ Salvar Alterações</button>
        </form>

        <script>
            // Funcionar para adicionar perícia
            function adicionarPericia(fichaId) {
                const nome = document.getElementById('nova-pericia-nome').value.trim();
                const bonus = parseInt(document.getElementById('nova-pericia-bonus').value) || 0;

                if (!nome) {
                    alert('Digite o nome da perícia!');
                    return;
                }

                fetch(`/api/ficha/${fichaId}/pericias`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, bonus })
                })
                .then(r => r.json())
                .then(data => {
                    if (data.sucesso) {
                        alert('✅ Perícia adicionada!');
                        document.getElementById('nova-pericia-nome').value = '';
                        document.getElementById('nova-pericia-bonus').value = '0';
                        location.reload();
                    }
                })
                .catch(e => console.error(e));
            }

            // Função para remover perícia
            function removerPericia(fichaId, periciaNome) {
                if (!confirm(`Remover perícia: ${periciaNome}?`)) return;

                fetch(`/api/ficha/${fichaId}/pericias/${encodeURIComponent(periciaNome)}`, {
                    method: 'DELETE'
                })
                .then(r => r.json())
                .then(data => {
                    if (data.sucesso) {
                        alert('✅ Perícia removida!');
                        location.reload();
                    }
                })
                .catch(e => console.error(e));
            }
        </script>
    </div>
</body>
</html>
